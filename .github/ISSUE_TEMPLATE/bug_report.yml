name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `printf '...' | ./ipe`
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS (arm64)
        - macOS (x64)
        - Linux (x64)
        - Windows (x64)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: IPE version
      description: "Run `~/.ipe/ipe --version` or check the release you downloaded"
      placeholder: "v0.1.0"
