name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release create "$TAG_NAME" --generate-notes --draft=false

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
            ext: ""
          - os: ubuntu-latest
            target: linux-x64
            ext: ""
          - os: windows-latest
            target: windows-x64
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Stamp version
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: sed -i.bak "s/const VERSION = \"dev\"/const VERSION = \"$TAG_NAME\"/" apps/hook/server/index.ts

      - run: bun run build

      - name: Rename binary
        shell: bash
        run: mv ipe${{ matrix.ext }} ipe-${{ matrix.target }}${{ matrix.ext }}

      - name: Upload release asset
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release upload "$TAG_NAME" ipe-${{ matrix.target }}${{ matrix.ext }} --clobber
