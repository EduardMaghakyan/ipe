name: Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.14)"
        required: true

permissions:
  contents: write

jobs:
  create-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Get tag name
        id: tag
        run: echo "tag_name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --generate-notes --draft=false

  build:
    needs: create-release
    if: ${{ !cancelled() && needs.create-release.result != 'failure' }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
            ext: ""
          - os: ubuntu-latest
            target: linux-x64
            ext: ""
          - os: windows-latest
            target: windows-x64
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    env:
      TAG_NAME: ${{ needs.create-release.outputs.tag_name || github.event.release.tag_name || github.event.inputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.1"

      - run: bun install

      - name: Stamp version
        shell: bash
        run: sed -i.bak "s/const VERSION = \"dev\"/const VERSION = \"$TAG_NAME\"/" apps/hook/server/index.ts

      - run: bun run build

      - name: Verify or ad-hoc sign (macOS)
        if: runner.os == 'macOS'
        run: codesign -dv ipe 2>&1 | grep -q "Signature=adhoc" || codesign -f -s - ipe

      - name: Rename binary
        shell: bash
        run: mv ipe${{ matrix.ext }} ipe-${{ matrix.target }}${{ matrix.ext }}

      - name: Upload release asset
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$TAG_NAME" ipe-${{ matrix.target }}${{ matrix.ext }} --clobber
